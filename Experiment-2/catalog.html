<!DOCTYPE html>
<html>
<head>
<title>Ticket Catalog</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container-fluid">

<a class="navbar-brand">E-Ticketing</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="catalog.html">Catalog</a>
</li>

<li class="nav-item">

</li>

<li class="nav-item">

</li>

</ul>

</div>

</nav>


<!-- Header -->
<div class="bg-success text-white text-center p-3">

<h3>E-Ticketing System</h3>

<p>Welcome – SAMEEKSHA_24WH1A05C5</p>

</div>


<!-- Catalog -->
<div class="container mt-4">

<h3 class="mb-4">Available Tickets</h3>

<div class="row g-4">

<!-- Movie -->
<div class="col-md-4">

<div class="card">

<img src="images/movie.png"
class="card-img-top"
style="height:200px; object-fit:cover;">

<div class="card-body text-center">

<h5 class="card-title">Movie Ticket</h5>

<p>₹200</p>

<button class="btn btn-success"
onclick="addToCart('Movie Ticket',200)">
Book Ticket
</button>

</div>

</div>
</div>


<!-- Train -->
<div class="col-md-4">

<div class="card">

<img src="images/train.png"
class="card-img-top"
style="height:200px; object-fit:cover;">

<div class="card-body text-center">

<h5 class="card-title">Train Ticket</h5>

<p>₹500</p>

<button class="btn btn-success"
onclick="addToCart('Train Ticket',500)">
Book Ticket
</button>

</div>

</div>
</div>


<!-- Flight -->
<div class="col-md-4">

<div class="card">

<img src="images/flight.png"
class="card-img-top"
style="height:200px; object-fit:cover;">

<div class="card-body text-center">

<h5 class="card-title">Flight Ticket</h5>

<p>₹2000</p>

<button class="btn btn-success"
onclick="addToCart('Flight Ticket',2000)">
Book Ticket
</button>

</div>

</div>
</div>

</div>


<!-- View Cart Button -->

<div class="text-center mt-4">

<a href="cart.html" class="btn btn-primary">
View Cart
</a>

</div>

</div>


<script src="script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</html>
